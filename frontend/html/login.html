<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Вход</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

<div class="page-wrapper">
    <div class="login-container">
        <h1 class="title">Вход в системата</h1>
        <p class="subtitle">ГДПБЗН - България</p>

        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="Въведи потребителско име">
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Въведи парола">
            </div>

            <button type="submit" class="btn-primary">Вход</button>
        </form>

        <p class="register-link">
            Нямаш акаунт? <a href="register.html">Регистрация</a>
        </p>
    </div>

    <div class="decorative-circle"></div>
</div>

<script src="../js/login.js"></script>
</body>
</html>
